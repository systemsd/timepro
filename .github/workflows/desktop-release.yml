name: Desktop Release

# Version-driven desktop installer release.
#
# Trigger: a push to `main` that touches `apps/desktop/**` (or this workflow).
# A `version-check` job reads the version from `apps/desktop/src-tauri/tauri.conf.json`
# and asks the downloads repo whether a Release `v<version>` already exists:
#   - exists  → skip (no rebuild).
#   - missing → build + publish.
# So a release happens ONLY when you bump `version` in tauri.conf.json and merge.
# (`workflow_dispatch` with `force: true` rebuilds even if the version exists.)
#
# The code lives in this PRIVATE repo, but installers are published to a SEPARATE
# PUBLIC repo (`systemsd/timepro-downloads`) so anonymous employees can download
# them while the source stays private. Cross-repo publishing uses a fine-grained
# PAT (`RELEASES_REPO_TOKEN`, Contents: write on timepro-downloads). Because we
# never push a tag from CI, the GITHUB_TOKEN "no re-trigger" rule doesn't apply.
#
# Builds are UNSIGNED (no Apple Developer ID / Windows cert yet) — users approve
# the app in Gatekeeper/SmartScreen on first launch.

on:
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - ".github/workflows/desktop-release.yml"
  workflow_dispatch:
    inputs:
      force:
        description: "Build & publish even if this version is already released"
        type: boolean
        default: false

permissions:
  contents: read # we publish to ANOTHER repo via PAT, not this one

env:
  DOWNLOADS_REPO: systemsd/timepro-downloads

jobs:
  # Resolve the desktop version and decide whether a release is needed.
  version-check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version + check if already released
        id: check
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          set -euo pipefail
          VERSION="v$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Desktop version: $VERSION"
          if [ "$FORCE" = "true" ]; then
            echo "Force requested → will build & publish."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # List releases (drafts included when authenticated) and look for the tag.
          EXISTS=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${DOWNLOADS_REPO}/releases?per_page=100" \
            | VERSION="$VERSION" node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{const r=JSON.parse(s);process.stdout.write(Array.isArray(r)&&r.some(x=>x.tag_name===process.env.VERSION)?'yes':'no')}catch(e){process.stdout.write('no')}})")
          if [ "$EXISTS" = "yes" ]; then
            echo "Release $VERSION already exists → skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release $VERSION yet → will build & publish."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          # Linux temporarily disabled — ship mac + Windows first. The ubuntu-24.04
          # build compiles fine now; it only needs `libgbm-dev` at link time (-lgbm),
          # already staged in the deps step below. Re-enable by uncommenting:
          # - platform: ubuntu-24.04
          #   target: ""
          #   args: ""
          - platform: windows-latest
            target: ""
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies (Tauri v2)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libxss-dev \
            libpipewire-0.3-dev \
            libdbus-1-dev \
            libgbm-dev \
            build-essential \
            file

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # Build only (no tagName → tauri-action does not create a release; it just
      # builds and exposes the built files via the `artifactPaths` output).
      - name: Build installers
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          # Bake the production hosts into the binary at compile time
          # (option_env! in state.rs); reinforces the PRODUCTION_*_BASE constants.
          TIMEPRO_API_URL: https://api.timepro.systemsd.co
          TIMEPRO_WEB_URL: https://timepro.systemsd.co
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}

      # Glob the bundle dirs directly. (GitHub expressions don't turn '\n' into a
      # real newline, so a join(artifactPaths, '\n') produces one bogus path.) `**`
      # matches both `target/release/...` (linux/win) and `target/<triple>/release/...`
      # (the --target mac builds). Each platform matches only its own installer types.
      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/**/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/**/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/**/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/**/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  publish:
    needs: [version-check, build]
    if: needs.version-check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List collected installers
        run: find dist -type f -print

      # Publish ONE draft Release to the public downloads repo using the PAT.
      # (Flip `draft: false` for fully hands-off publishing.)
      - name: Publish draft release to downloads repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.DOWNLOADS_REPO }}
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ needs.version-check.outputs.version }}
          name: "TimePro Desktop ${{ needs.version-check.outputs.version }}"
          body: |
            TimePro desktop agent ${{ needs.version-check.outputs.version }}.

            These installers are **unsigned** — on first launch:
            - macOS: right-click → Open (or allow in System Settings → Privacy & Security).
            - Windows: More info → Run anyway (SmartScreen).
          draft: true
          prerelease: false
          files: dist/**/*
          fail_on_unmatched_files: true
