name: Desktop Release

# Cross-platform installers for the TimePro desktop agent.
# Trigger: push a tag like `v0.1.0` (or run manually).
#
# The code lives in this PRIVATE repo, but installers are published to a SEPARATE
# PUBLIC repo (`systemsd/timepro-downloads`) so anonymous employees can download
# them while the source stays private. GitHub's default GITHUB_TOKEN can only
# write to THIS repo, so cross-repo publishing uses a fine-grained PAT
# (`RELEASES_REPO_TOKEN`, Contents: write on timepro-downloads).
#
# Flow: each OS builds its installers (no release) → uploads them as workflow
# artifacts → a single `publish` job collects all four and creates ONE draft
# Release in timepro-downloads. (Two phases avoid a race on release creation.)
#
# Interim policy: builds are UNSIGNED (no Apple Developer ID / Windows cert yet),
# so users approve the app in Gatekeeper/SmartScreen on first launch.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read # we publish to ANOTHER repo via PAT, not this one

env:
  DOWNLOADS_REPO: systemsd/timepro-downloads

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          # Linux temporarily disabled — ship mac + Windows first. The ubuntu-24.04
          # build compiles fine now; it only needs `libgbm-dev` at link time (-lgbm),
          # already staged in the deps step below. Re-enable by uncommenting:
          # - platform: ubuntu-24.04
          #   target: ""
          #   args: ""
          - platform: windows-latest
            target: ""
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies (Tauri v2)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libxss-dev \
            libpipewire-0.3-dev \
            libdbus-1-dev \
            libgbm-dev \
            build-essential \
            file

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # Build only (no tagName → tauri-action does not create a release; it just
      # builds and exposes the built files via the `artifactPaths` output).
      - name: Build installers
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          # Bake the production hosts into the binary at compile time
          # (option_env! in state.rs); reinforces the PRODUCTION_*_BASE constants.
          TIMEPRO_API_URL: https://api.timepro.systemsd.co
          TIMEPRO_WEB_URL: https://timepro.systemsd.co
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}

      # Glob the bundle dirs directly. (GitHub expressions don't turn '\n' into a
      # real newline, so a join(artifactPaths, '\n') produces one bogus path.) `**`
      # matches both `target/release/...` (linux/win) and `target/<triple>/release/...`
      # (the --target mac builds). Each platform matches only its own installer types.
      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/**/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/**/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/**/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/**/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List collected installers
        run: find dist -type f -print

      # Publish ONE draft Release to the public downloads repo using the PAT.
      - name: Publish draft release to downloads repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.DOWNLOADS_REPO }}
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: "TimePro Desktop ${{ github.ref_name }}"
          body: |
            TimePro desktop agent ${{ github.ref_name }}.

            These installers are **unsigned** — on first launch:
            - macOS: right-click → Open (or allow in System Settings → Privacy & Security).
            - Windows: More info → Run anyway (SmartScreen).
          draft: true
          prerelease: false
          files: dist/**/*
          fail_on_unmatched_files: true
