name: Desktop Release

# Cross-platform installers for the TimePro desktop agent.
# Trigger: push a tag like `v0.1.0` (or run manually). The job builds the
# Tauri app on each OS and uploads the installers to a GitHub Release.
#
# Interim policy: builds are UNSIGNED (no Apple Developer ID / Windows cert yet),
# so users approve the app in Gatekeeper/SmartScreen on first launch. Code
# signing + notarization is a later task — when certs exist, add the signing
# secrets to the tauri-action env below.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release + upload assets

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            target: ""
            args: ""
          - platform: windows-latest
            target: ""
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies (Tauri v2)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            file

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Bake the production hosts into the binary at compile time
          # (option_env! in state.rs); reinforces the PRODUCTION_*_BASE constants.
          TIMEPRO_API_URL: https://api.timepro.systemsd.co
          TIMEPRO_WEB_URL: https://timepro.systemsd.co
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "TimePro Desktop ${{ github.ref_name }}"
          releaseBody: |
            TimePro desktop agent ${{ github.ref_name }}.

            These installers are **unsigned** — on first launch:
            - macOS: right-click → Open (or allow in System Settings → Privacy & Security).
            - Windows: More info → Run anyway (SmartScreen).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
