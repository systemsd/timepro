# TimePro reverse proxy — co-located with OpsCore on the same nginx host.
#
#   timepro.systemsd.co      → web  (127.0.0.1:3005)
#   api.timepro.systemsd.co  → api  (127.0.0.1:4001, incl. /v1/realtime WebSocket)
#
# The app containers (infra/compose/docker-compose.prod.yml) bind only to
# 127.0.0.1, so nginx is the sole public entry point. TLS via Let's Encrypt —
# obtain the certs BEFORE enabling this file (see infra/nginx/README.md), or
# nginx -t fails on the missing ssl_certificate paths.
#
# Install: see infra/nginx/README.md.

# Shared upstreams (host-local published ports from the compose stack).
upstream timepro_web { server 127.0.0.1:3005; keepalive 16; }
upstream timepro_api { server 127.0.0.1:4001; keepalive 16; }

# WebSocket upgrade mapping (realtime presence).
map $http_upgrade $timepro_connection_upgrade {
    default upgrade;
    ''      close;
}

########################################
# API — api.timepro.systemsd.co
########################################
server {
    listen 80;
    listen [::]:80;
    server_name api.timepro.systemsd.co;

    # ACME http-01 challenge (webroot); everything else → https.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.timepro.systemsd.co;

    ssl_certificate     /etc/letsencrypt/live/api.timepro.systemsd.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.timepro.systemsd.co/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;

    # Screenshot uploads can be a few MB; allow headroom.
    client_max_body_size 25m;

    # Realtime presence WebSocket — long-lived upgrade.
    location /v1/realtime {
        proxy_pass http://timepro_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $timepro_connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    location / {
        proxy_pass http://timepro_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

########################################
# Web — timepro.systemsd.co
########################################
server {
    listen 80;
    listen [::]:80;
    server_name timepro.systemsd.co;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name timepro.systemsd.co;

    ssl_certificate     /etc/letsencrypt/live/timepro.systemsd.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/timepro.systemsd.co/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
        proxy_pass http://timepro_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
