<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 13px -apple-system, system-ui, sans-serif; width: 260px; margin: 0; padding: 14px; color: #2f2f2f; }
      h1 { font-size: 14px; margin: 0 0 10px; }
      .row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; gap: 8px; }
      .muted { color: #8a9097; }
      input[type='text'] { width: 100%; box-sizing: border-box; padding: 6px 8px; border: 1px solid #e6e8eb; border-radius: 6px; font: inherit; }
      button { border: 1px solid #e6e8eb; background: #fff; border-radius: 6px; padding: 6px 10px; cursor: pointer; font: inherit; }
      button.primary { background: #5b56e0; color: #fff; border-color: #5b56e0; }
      .status { font-weight: 600; }
      .ok { color: #2faa46; }
      .off { color: #e2604f; }
      label.sw { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>TimePro URL Tracker</h1>
    <div class="row"><span class="muted">Signed in</span><span id="user" class="status">—</span></div>
    <div class="row"><span class="muted">Buffered</span><span id="buffered">0</span></div>
    <div class="row">
      <label class="sw"><input type="checkbox" id="enabled" /> Tracking</label>
      <button id="flush">Send now</button>
    </div>
    <div class="row" style="flex-direction: column; align-items: stretch;">
      <span class="muted" style="margin-bottom: 4px;">API base</span>
      <input type="text" id="apiBase" placeholder="http://localhost:4001" />
    </div>
    <div class="row"><button id="save" class="primary" style="width:100%">Save</button></div>
    <div id="msg" class="muted"></div>
    <script src="popup.js"></script>
  </body>
</html>
